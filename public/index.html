<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relâmpago Manager</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 40px; background: #f8fafc; color: #111827; }
      .card { max-width: 760px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,.08); }
      code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
      a { color: #0f766e; text-decoration: none; font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Relâmpago Manager</h1>
      <p>Aplicação pronta para gerenciar <strong>origens</strong> e <strong>grupos</strong> com PostgreSQL.</p>
      <p>Acesse o painel em <a href="/admin">/admin</a>.</p>
      <p>Endpoints principais:</p>
      <ul>
        <li><code>/api/health</code></li>
        <li><code>/api/origins</code></li>
        <li><code>/api/groups</code></li>
        <li><code>/api/resolve?origin_key=origem_pet</code></li>
        <li><code>/r/pet</code></li>
      </ul>
    </div>
  </body>
</html>
